<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scratch Adventure AR : Conditionals Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap');
        body { font-family: 'Chakra Petch', sans-serif; user-select: none; -webkit-user-select: none; margin: 0; overflow: hidden; background-color: #111827;}
        
        /* Quiz Option Buttons */
        .scratch-block {
            position: relative; padding: 12px 20px; color: white; font-weight: 600;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.3); cursor: pointer;
            transition: transform 0.1s; margin-bottom: 10px;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.3);
        }
        .scratch-block:hover { transform: scale(1.02); }
        .scratch-block:active { transform: scale(0.98); }
        
        .block-control { background-color: #ffab19; border-radius: 8px; border-top-left-radius: 12px; }
        .block-operator { background-color: #59c059; clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0% 50%); padding: 12px 25px; text-align: center; }
        .block-sensing { background-color: #4cbfe6; clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0% 50%); padding: 12px 25px; text-align: center; }
        
        /* ----------------------------------------------------- */
        /* ✨ VIRTUAL SCRATCH BLOCKS CSS (For Question Display) ✨ */
        /* ----------------------------------------------------- */
        .s-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: bold; color: white; text-shadow: 1px 1px 0px rgba(0,0,0,0.3); font-size: 1.2rem; display: flex; flex-direction: column; align-items: flex-start; }
        .s-c-top { background-color: #ffab19; border-radius: 8px 8px 8px 0; padding: 10px 16px; display: flex; align-items: center; gap: 8px; box-shadow: inset 1px 1px 0px rgba(255,255,255,0.4); }
        .s-c-mid { background-color: #ffab19; width: 30px; height: 35px; border-left: 1px solid rgba(255,255,255,0.4); }
        .s-c-bot { background-color: #ffab19; border-radius: 0 0 8px 8px; padding: 10px 16px; min-width: 120px; box-shadow: inset 1px -1px 0px rgba(255,255,255,0.4), inset -1px -1px 0px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.2); }
        .s-stack { background-color: #ffab19; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 8px; box-shadow: inset 1px 1px 0px rgba(255,255,255,0.4), inset -1px -1px 0px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.2); }
        .s-hex { clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0% 50%); padding: 6px 20px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: inset 1px 1px 0px rgba(255,255,255,0.5), inset -1px -1px 0px rgba(0,0,0,0.3); filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)); }
        .s-hex-op { background-color: #59c059; }
        .s-hex-se { background-color: #4cbfe6; }
        .s-hex-empty { background-color: rgba(0,0,0,0.2); width: 45px; height: 30px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); filter: none; }
        .s-round { background-color: white; color: #333; border-radius: 20px; padding: 2px 10px; font-weight: normal; text-shadow: none; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.4); min-width: 30px; text-align: center; font-size: 1rem;}
        .s-round-var { background-color: #ff8c1a; color: white; border-radius: 20px; padding: 4px 12px; box-shadow: inset 1px 1px 0px rgba(255,255,255,0.4), inset -1px -1px 0px rgba(0,0,0,0.2); }
        
        /* ปรับแต่งกล้องวิดีโอให้เป็นพื้นหลังเต็มจอ */
        #ar-video { position: fixed; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 0; opacity: 0.9; }
        #gameCanvas { position: relative; z-index: 1; }
        .hide { display: none !important; }
    </style>
</head>
<body class="w-screen h-screen m-0 p-0 text-white bg-black">

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-900/95 p-6">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 text-orange-400 text-center drop-shadow-lg leading-snug">Scratch Adventure AR<br><span class="text-3xl text-green-400">Conditionals Quest</span></h1>
        <p class="text-lg md:text-xl mb-8 text-center max-w-2xl text-gray-200"><span class="text-sm text-gray-400">(ใช้ปุ่มลูกศร, คีย์บอร์ด, ทัชสกรีน หรือเปิดกล้องเพื่อควบคุมด้วยมือ)</span></p>
        <button id="start-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-2xl shadow-[0_5px_0_#2563eb] active:shadow-none active:translate-y-1 transition-all">
            เริ่มเกม (Start Game)
        </button>
    </div>

    <!-- HUD -->
    <div id="hud" class="absolute top-4 left-4 z-10 flex gap-4 md:gap-6 text-white text-xl md:text-2xl font-bold drop-shadow-md hide">
        <div class="flex items-center gap-1"><span class="text-red-500 text-2xl md:text-3xl">❤️</span> <span id="hp-display">5</span></div>
        <div class="flex items-center gap-1"><span class="text-yellow-400 text-2xl md:text-3xl">⭐</span> <span id="score-display">0</span></div>
        <div id="sector-display" class="bg-gray-800/50 px-4 py-1 rounded-full text-sm md:text-lg">Sector: 1/20</div>
    </div>
    
    <!-- Warning Message -->
    <div id="warning-msg" class="absolute top-24 left-1/2 -translate-x-1/2 z-20 text-red-500 text-2xl md:text-3xl font-bold drop-shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none text-center w-full">
        แจ้งเตือน!
    </div>

    <!-- AR Camera Feed -->
    <video id="ar-video" class="hide" autoplay playsinline></video>
    <div id="ar-status" class="absolute top-[150px] right-5 z-10 text-white text-xs md:text-sm bg-black/50 px-2 py-1 rounded hide">AR: Loading...</div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas" class="block w-full h-full"></canvas>

    <!-- Mobile Touch Controls -->
    <div id="touch-controls" class="absolute bottom-6 left-0 w-full px-6 flex justify-between z-10 hide lg:hidden">
        <div class="flex gap-2 md:gap-4">
            <button id="btn-left" class="w-16 h-16 md:w-20 md:h-20 bg-white/20 border-2 border-white/50 rounded-full text-white text-3xl flex items-center justify-center backdrop-blur-sm active:bg-white/40">◀</button>
            <button id="btn-right" class="w-16 h-16 md:w-20 md:h-20 bg-white/20 border-2 border-white/50 rounded-full text-white text-3xl flex items-center justify-center backdrop-blur-sm active:bg-white/40">▶</button>
        </div>
        <button id="btn-jump" class="w-16 h-16 md:w-20 md:h-20 bg-white/20 border-2 border-white/50 rounded-full text-white text-3xl flex items-center justify-center backdrop-blur-sm active:bg-white/40">▲</button>
    </div>

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="absolute inset-0 z-40 bg-black/80 flex flex-col items-center justify-center p-4 hide">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-3xl w-full shadow-2xl border-4 border-orange-400 overflow-y-auto max-h-screen relative">
            
            <!-- VIRTUAL BLOCK DISPLAY AREA -->
            <div id="quiz-visual" class="flex justify-center mb-6 transform scale-90 md:scale-100 origin-center min-h-[80px] drop-shadow-xl">
                <!-- Injected via JS -->
            </div>
            
            <h2 id="quiz-question" class="text-xl md:text-2xl font-bold mb-6 text-gray-800 text-center leading-relaxed">คำถาม?</h2>
            
            <div id="quiz-options" class="flex flex-col gap-3">
                <!-- Options injected by JS -->
            </div>
        </div>
    </div>

<script>
function fillRoundRect(ctx, x, y, width, height, radius) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.arcTo(x + width, y, x + width, y + height, radius);
    ctx.arcTo(x + width, y + height, x, y + height, radius); ctx.arcTo(x, y + height, x, y, radius);
    ctx.arcTo(x, y, x + width, y, radius); ctx.closePath(); ctx.fill();
}
function strokeRoundRect(ctx, x, y, width, height, radius) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.arcTo(x + width, y, x + width, y + height, radius);
    ctx.arcTo(x + width, y + height, x, y + height, radius); ctx.arcTo(x, y + height, x, y, radius);
    ctx.arcTo(x, y, x + width, y, radius); ctx.closePath(); ctx.stroke();
}

/** * GAME DATA WITH VISUAL HTML BLOCKS 
 */
const questions = [
    { q: "Control: บล็อกรูปตัว C นี้ ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-c-top">if <div class="s-hex s-hex-empty"></div> then</div><div class="s-c-mid"></div><div class="s-c-bot"></div></div>`, type: "control", options: ["ถ้าเงื่อนไขในหกเหลี่ยมเป็นจริง จะทำคำสั่งข้างใน", "วนซ้ำคำสั่งไปเรื่อยๆ ไม่มีที่สิ้นสุด", "หยุดรอจนกว่าเงื่อนไขจะเป็นจริง", "ตรวจสอบการสัมผัสตัวละคร"], ans: 0 },
    { q: "Control: บล็อกนี้ต่างจาก if ธรรมดาอย่างไร?", blockHTML: `<div class="s-text"><div class="s-c-top">if <div class="s-hex s-hex-empty"></div> then</div><div class="s-c-mid"></div><div class="s-c-bot" style="border-radius: 0 8px 8px 0; border-bottom:none;">else</div><div class="s-c-mid"></div><div class="s-c-bot"></div></div>`, type: "control", options: ["หยุดการทำงานของโปรแกรมทั้งหมด", "มีทางเลือกสำรองให้ทำ เมื่อเงื่อนไขเป็นเท็จ", "ทำซ้ำคำสั่งที่อยู่ใน else 10 รอบ", "ใช้สำหรับตรวจสอบเงื่อนไขที่เป็นจริงเท่านั้น"], ans: 1 },
    { q: "Control: บล็อกนี้ทำงานอย่างไร?", blockHTML: `<div class="s-text"><div class="s-stack">wait until <div class="s-hex s-hex-empty"></div></div></div>`, type: "control", options: ["ทำงานทันทีโดยไม่ต้องรอ", "หยุดรอเวลา 1 วินาที", "หยุดรอจนกว่าเงื่อนไขในช่องหกเหลี่ยมจะเป็นจริง", "รอจนกว่าผู้เล่นจะกดคลิกเมาส์เท่านั้น"], ans: 2 },
    { q: "Control: บล็อกนี้ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-c-top">repeat until <div class="s-hex s-hex-empty"></div></div><div class="s-c-mid"></div><div class="s-c-bot"></div></div>`, type: "control", options: ["ทำซ้ำคำสั่งข้างในไปเรื่อยๆ จนกว่าเงื่อนไขจะเป็นจริง", "ทำซ้ำคำสั่งข้างในไปเรื่อยๆ จนกว่าเงื่อนไขจะเป็นเท็จ", "ทำซ้ำตามจำนวนรอบที่กำหนดเท่านั้น", "ใช้ทำซ้ำเฉพาะเมื่อตัวละครชนขอบจอ"], ans: 0 },
    { q: "Operators: บล็อกรูปทรงหกเหลี่ยม (Boolean) ให้ค่าผลลัพธ์เป็นอะไรเสมอ?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op" style="width:100px; height:45px;"></div></div>`, type: "operator", options: ["ตัวเลข 0 ถึง 9", "ข้อความ (String)", "จริง (True) หรือ เท็จ (False)", "สีต่างๆ ในเกม"], ans: 2 },
    { q: "Operators: บล็อกสีเขียวนี้ ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op"><div class="s-round"></div> &gt; <div class="s-round"></div></div></div>`, type: "operator", options: ["ตรวจสอบว่าค่าแรก เท่ากับ ค่าที่สอง", "ตรวจสอบว่าค่าแรก มากกว่า ค่าที่สองหรือไม่", "ตรวจสอบว่าค่าแรก น้อยกว่า ค่าที่สองหรือไม่", "ใช้สุ่มตัวเลข"], ans: 1 },
    { q: "Operators: บล็อกสีเขียวนี้ ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op"><div class="s-round"></div> &lt; <div class="s-round"></div></div></div>`, type: "operator", options: ["ตรวจสอบว่าค่าแรก น้อยกว่า ค่าที่สองหรือไม่", "เปรียบเทียบว่าค่าใดมีขนาดยาวกว่า", "ใช้ตรวจสอบการสัมผัสสี", "ตรวจสอบว่าค่าแรก มากกว่า ค่าที่สอง"], ans: 0 },
    { q: "Operators: บล็อกสีเขียวนี้ ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op"><div class="s-round"></div> = <div class="s-round">50</div></div></div>`, type: "operator", options: ["รวมข้อความสองอันเข้าด้วยกัน", "หารายชื่อตัวละครที่ซ้ำกัน", "ตรวจสอบว่าสองค่ามีค่าเท่ากันเป๊ะหรือไม่", "ตั้งค่าตัวแปรให้มีค่าใหม่"], ans: 2 },
    { q: "Operators: บล็อกตรรกะนี้ ทำงานอย่างไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op"><div class="s-hex s-hex-empty"></div> and <div class="s-hex s-hex-empty"></div></div></div>`, type: "operator", options: ["เป็นจริงเมื่อเงื่อนไขใดเงื่อนไขหนึ่งเป็นจริง", "เป็นเท็จเมื่อทั้งสองเงื่อนไขเป็นจริง", "ตรวจสอบว่าตัวละครมี 2 ตัวหรือไม่", "เป็นจริงได้ ก็ต่อเมื่อทั้งสองเงื่อนไขต้องเป็นจริงทั้งคู่"], ans: 3 },
    { q: "Operators: บล็อกตรรกะนี้ ทำงานอย่างไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op"><div class="s-hex s-hex-empty"></div> or <div class="s-hex s-hex-empty"></div></div></div>`, type: "operator", options: ["เป็นจริงได้ เมื่อมีเงื่อนไขใดเงื่อนไขหนึ่งเป็นจริงก็พอ", "ต้องเป็นจริงทั้งสองเงื่อนไขเท่านั้น", "ใช้สุ่มเงื่อนไขว่าจะทำอันไหน", "ให้ผลลัพธ์เป็นตัวเลขเสมอ"], ans: 0 },
    { q: "Operators: บล็อกนี้ใช้ทำอะไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-op">not <div class="s-hex s-hex-empty"></div></div></div>`, type: "operator", options: ["สร้างเงื่อนไขใหม่ที่ไม่มีอยู่จริง", "กลับค่าความจริง (เช่น จากจริงกลายเป็นเท็จ)", "ลบคำสั่งข้างในทิ้ง", "ทำซ้ำคำสั่งเดิม 2 รอบ"], ans: 1 },
    { q: "Sensing: บล็อกหกเหลี่ยมสีฟ้า มักนำไปใส่ใน if เพื่ออะไร?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-se">touching <div class="s-round" style="background:#1a85ff; color:white; box-shadow:none;">mouse-pointer ▼</div> ?</div></div>`, type: "sensing", options: ["ตรวจสอบว่าตัวละครเปลี่ยนชุดหรือยัง", "ตรวจสอบว่าตัวละครแตะโดนเมาส์หรือตัวละครอื่นไหม", "ทำให้เมาส์ขยับไม่ได้", "ตั้งค่าให้ตัวละครเดินตามเมาส์"], ans: 1 },
    { q: "Sensing: บล็อกนี้ มีประโยชน์อย่างไรในการสร้างเกม?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-se">touching color <div class="s-round" style="background:#ffffff; border:2px solid #ccc; width:22px; height:22px; border-radius:50%; padding:0; min-width:22px;"></div> ?</div></div>`, type: "sensing", options: ["เปลี่ยนสีตัวละครตามที่ต้องการ", "เปลี่ยนสีพื้นหลังเวที", "ซ่อนตัวละครเมื่อโดนสีขาว", "ตรวจสอบการชนกำแพง สิ่งกีดขวาง หรือพื้นสีนั้นๆ"], ans: 3 },
    { q: "Sensing: บล็อกนี้ เมื่ออยู่ใน if จะเกิดอะไรขึ้น?", blockHTML: `<div class="s-text"><div class="s-hex s-hex-se">key <div class="s-round" style="background:#1a85ff; color:white; box-shadow:none;">space ▼</div> pressed?</div></div>`, type: "sensing", options: ["เช็คว่าผู้เล่นกำลังกดปุ่มสเปซบาร์อยู่หรือไม่", "พิมพ์ข้อความว่า space บนหน้าจอ", "สั่งให้คีย์บอร์ดพิมพ์อักษรเว้นวรรค", "ห้ามไม่ให้ผู้เล่นกดปุ่มใดๆ"], ans: 0 },

const BIOME_COLORS = { control: { bg: "#4a3310", plat: "#ffab19" }, operator: { bg: "#1a3b1a", plat: "#59c059" }, sensing: { bg: "#153a47", plat: "#4cbfe6" } };

const Audio = {
    synths: {}, enabled: false,
    init() {
        if (typeof Tone === 'undefined') return;
        try {
            this.synths.jump = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination();
            this.synths.coin = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
            this.synths.correct = new Tone.PolySynth().toDestination();
            this.synths.wrong = new Tone.Synth({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.1, decay: 0.3, sustain: 0, release: 0.2 } }).toDestination();
            this.enabled = true;
        } catch (e) {}
    },
    playJump() { if(this.enabled) this.synths.jump.triggerAttackRelease("C4", "8n"); },
    playCoin() { if(this.enabled) this.synths.coin.triggerAttackRelease("E5", "16n"); },
    playCorrect() { 
        if(!this.enabled) return; const now = Tone.now();
        this.synths.correct.triggerAttackRelease(["C5", "E5", "G5"], "8n", now);
        this.synths.correct.triggerAttackRelease(["E5", "G5", "C6"], "4n", now + 0.15);
    },
    playWrong() { if(this.enabled) this.synths.wrong.triggerAttackRelease("G2", "4n"); }
};

const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); let cw, ch;
let currentHand = null; let smoothedHand = []; // ตัวแปรสำหรับจำลองมือที่ลื่นไหล

const GameState = { running: false, paused: false, hp: 5, score: 0, sector: 0, checkpointX: 100, cameraX: 0, speedBoostTimer: 0,
    init() { this.hp = 5; this.score = 0; this.sector = 0; this.checkpointX = 100; this.cameraX = 0; this.updateHUD(); },
    updateHUD() {
        document.getElementById('hp-display').innerText = this.hp;
        document.getElementById('score-display').innerText = this.score;
        document.getElementById('sector-display').innerText = `Sector: ${Math.min(this.sector + 1, 20)}/20`;
    }
};

const Inputs = { left: false, right: false, jump: false, jumpPressed: false };

class Player {
    constructor() {
        this.x = 100; this.y = 50; this.w = 40; this.h = 50; this.vx = 0; this.vy = 0;
        this.baseSpeed = 5; this.jumpPower = -14.5; this.gravity = 0.6; this.grounded = false;
        this.frame = 0; this.facingRight = true;
    }
    update() {
        let speed = GameState.speedBoostTimer > 0 ? this.baseSpeed * 1.2 : this.baseSpeed;
        if(GameState.speedBoostTimer > 0) GameState.speedBoostTimer--;
        if (Inputs.left) { this.vx = -speed; this.facingRight = false; this.frame++; }
        else if (Inputs.right) { this.vx = speed; this.facingRight = true; this.frame++; }
        else { this.vx = 0; this.frame = 0; }

        if (Inputs.jump && this.grounded && !Inputs.jumpPressed) { this.vy = this.jumpPower; this.grounded = false; Audio.playJump(); Inputs.jumpPressed = true; }
        if (!Inputs.jump) Inputs.jumpPressed = false;
        this.vy += this.gravity; if (this.vy > 15) this.vy = 15; 
        this.x += this.vx; this.y += this.vy;
        if (this.y > ch + 100) this.fallIntoPit();
    }
    fallIntoPit() {
        GameState.hp--; Audio.playWrong(); GameState.updateHUD();
        if (GameState.hp <= 0) {
            showWarning("เกมโอเวอร์! เริ่มต้นใหม่"); GameState.hp = 5; GameState.score = 0; GameState.sector = 0;
            GameState.checkpointX = 100; GameState.updateHUD(); Map.generate();
        } else { showWarning("ระวังตกร่อง!"); }
        this.x = GameState.checkpointX; this.y = 50; this.vx = 0; this.vy = 0;
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
        if (!this.facingRight) ctx.scale(-1, 1);
        if (GameState.speedBoostTimer > 0) { ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 15; }
        const runCycle = Math.sin(this.frame * 0.2) * 12;
        ctx.fillStyle = "#ff0000"; ctx.beginPath();
        if(Math.abs(this.vx) > 0) { ctx.moveTo(-10, -5); ctx.quadraticCurveTo(-30 + runCycle, -10, -25, 10); ctx.lineTo(-10, 5); } 
        else { ctx.moveTo(-10, -5); ctx.lineTo(-20, 10); ctx.lineTo(-10, 10); } ctx.fill();
        ctx.fillStyle = "#e07b00"; ctx.fillRect(-8 + runCycle/2, 5, 6, 18); ctx.fillRect(4 - runCycle/2, 5, 6, 18);  
        ctx.fillStyle = "#ff8c00"; fillRoundRect(ctx, -15, -10, 30, 25, 8);
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.ellipse(2, 2, 10, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ff8c00"; ctx.fillRect(-4 - runCycle/2, 5, 6, 18); ctx.fillRect(8 + runCycle/2, 5, 6, 18); 
        ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.strokeStyle = "#ff8c00";
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.quadraticCurveTo(-30, -10 + runCycle/3, -25, -20); ctx.stroke();
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(-26, -18); ctx.lineTo(-25, -20); ctx.stroke();
        ctx.translate(3, -20);
        ctx.fillStyle = "#ff8c00"; ctx.beginPath(); ctx.moveTo(-12, -3); ctx.lineTo(-16, -20); ctx.lineTo(-4, -12); ctx.fill();
        ctx.beginPath(); ctx.moveTo(4, -12); ctx.lineTo(16, -20); ctx.lineTo(12, -3); ctx.fill();
        ctx.fillStyle = "#ffcc99"; ctx.beginPath(); ctx.moveTo(-11, -5); ctx.lineTo(-14, -17); ctx.lineTo(-5, -11); ctx.fill();
        ctx.beginPath(); ctx.moveTo(5, -11); ctx.lineTo(14, -17); ctx.lineTo(11, -5); ctx.fill();
        ctx.fillStyle = "#ff8c00"; ctx.beginPath(); ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(-6, -2, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(6, -2, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#00ff00"; ctx.beginPath(); ctx.arc(-5, -2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.arc(-4, -2, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -2, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-2, 3); ctx.lineTo(2, 3); ctx.lineTo(0, 5); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(-3, 7, 3, 0, Math.PI, false); ctx.stroke(); ctx.beginPath(); ctx.arc(3, 7, 3, 0, Math.PI, false); ctx.stroke();
        ctx.restore();
    }
}

class MapEngine {
    constructor() { this.platforms = []; this.coins = []; this.puzzlePiece = null; this.particles = []; }
    generate() {
        this.platforms = []; this.coins = []; this.particles = [];
        let startX = GameState.checkpointX - 50; let groundY = Math.max(ch - 150, 200);
        this.platforms.push({ x: startX, y: groundY, w: 600, h: ch });
        let curX = startX + 600;
        for(let i=0; i<5; i++) {
            curX += 60 + Math.random() * 80; 
            let pw = 180 + Math.random() * 200; 
            let py = groundY - (Math.random() * 60); 
            this.platforms.push({ x: curX, y: py, w: pw, h: ch });
            if (Math.random() > 0.3) {
                this.coins.push({ x: curX + pw/2 - 20, y: py - 40, collected: false });
                this.coins.push({ x: curX + pw/2 + 20, y: py - 40, collected: false });
            }
            curX += pw;
        }
        curX += 100;
        this.platforms.push({ x: curX, y: groundY, w: 500, h: ch });
        this.puzzlePiece = { x: curX + 250, y: groundY - 60, w: 40, h: 40, active: true };
    }
    draw(ctx, qType) {
        let colors = BIOME_COLORS[qType] || BIOME_COLORS.control;
        ctx.fillStyle = colors.plat; ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 3;
        this.platforms.forEach(p => {
            fillRoundRect(ctx, p.x, p.y, p.w, p.h, 8); strokeRoundRect(ctx, p.x, p.y, p.w, p.h, 8);
            ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(p.x+4, p.y+4, p.w-8, 8); ctx.fillStyle = colors.plat;
        });
        this.coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#cca800"; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
            }
        });
        if (this.puzzlePiece && this.puzzlePiece.active) {
            let p = this.puzzlePiece; let floatY = p.y + Math.sin(Date.now() * 0.005) * 10;
            ctx.fillStyle = "#ffffff"; ctx.shadowColor = "#ffffff"; ctx.shadowBlur = 15;
            ctx.font = "35px Arial"; ctx.textAlign = "center"; ctx.fillText("🧩", p.x, floatY + 30); ctx.shadowBlur = 0;
        }
        this.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            ctx.fillStyle = `rgba(255, 215, 0, ${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            if (p.life <= 0) this.particles.splice(i, 1);
        });
    }
    spawnParticles(x, y) { for(let i=0; i<30; i++) this.particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, r: Math.random() * 5 + 2, life: 1 }); }
}

const player = new Player(); const Map = new MapEngine();

function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; if(!GameState.running) Map.generate(); }
window.addEventListener('resize', resize);

function update() {
    if (GameState.paused) return; player.update();
    player.grounded = false;
    for (let p of Map.platforms) {
        if (player.vy >= 0 && player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h - player.vy <= p.y + 12 && player.y + player.h >= p.y) 
        { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
    }
    for (let c of Map.coins) {
        if (!c.collected && Math.hypot((player.x+player.w/2) - c.x, (player.y+player.h/2) - c.y) < 40) {
            c.collected = true; GameState.score += 10; GameState.updateHUD(); Audio.playCoin();
        }
    }
    if (Map.puzzlePiece && Map.puzzlePiece.active && Math.abs((player.x+player.w/2) - Map.puzzlePiece.x) < 40 && Math.abs((player.y+player.h/2) - Map.puzzlePiece.y) < 50) { triggerQuiz(); }
    let targetCamX = player.x - cw / 3; GameState.cameraX += (targetCamX - GameState.cameraX) * 0.1;
    if (GameState.cameraX < GameState.checkpointX - cw/2) GameState.cameraX = GameState.checkpointX - cw/2;
}

function draw() {
    let qType = questions[GameState.sector % questions.length].type;
    let bgCol = BIOME_COLORS[qType] ? BIOME_COLORS[qType].bg : BIOME_COLORS.control.bg;
    
    // ลบเฟรมเก่า และเติมพื้นหลังแบบโปร่งแสง (CC = ความทึบ 80%) เพื่อให้เห็นกล้องด้านหลัง
    ctx.clearRect(0, 0, cw, ch);
    ctx.fillStyle = bgCol + "CC"; 
    ctx.fillRect(0, 0, cw, ch);
    
    ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 2;
    let offsetX = -(GameState.cameraX * 0.5) % 100;
    for(let i=offsetX; i<cw; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, ch); ctx.stroke(); }
    for(let i=0; i<ch; i+=100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(cw, i); ctx.stroke(); }
    ctx.save(); ctx.translate(-GameState.cameraX, 0); Map.draw(ctx, qType); player.draw(ctx); ctx.restore();

    // วาดโครงกระดูกจำลองนิ้วมือ (Smooth Hand Rendering)
    if (currentHand) {
        if (smoothedHand.length === 0) {
            smoothedHand = JSON.parse(JSON.stringify(currentHand));
        } else {
            // Interpolation ช่วยทำให้เส้นที่วาดตามนิ้วไม่สั่น และเคลื่อนที่อย่างนุ่มนวล
            for(let i=0; i<currentHand.length; i++) {
                smoothedHand[i].x += (currentHand[i].x - smoothedHand[i].x) * 0.35;
                smoothedHand[i].y += (currentHand[i].y - smoothedHand[i].y) * 0.35;
            }
        }
        drawHandSkeleton(ctx, smoothedHand);
    } else {
        smoothedHand = [];
    }
}

// ฟังก์ชันวาดเส้นและจุดจำลองมือโฮโลแกรม
function drawHandSkeleton(ctx, landmarks) {
    ctx.save();
    const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
    
    ctx.strokeStyle = "rgba(0, 255, 255, 0.6)"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath();
    for (let [start, end] of connections) {
        // (1 - x) เพื่อแก้กลับให้ตรงกับวิดีโอที่โดนกลับซ้ายขวาเป็นกระจก
        ctx.moveTo((1 - landmarks[start].x) * cw, landmarks[start].y * ch);
        ctx.lineTo((1 - landmarks[end].x) * cw, landmarks[end].y * ch);
    }
    ctx.stroke();

    ctx.fillStyle = "#00ffff";
    for (let lm of landmarks) {
        ctx.beginPath(); ctx.arc((1 - lm.x) * cw, lm.y * ch, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function loop() { if(GameState.running) { update(); draw(); } requestAnimationFrame(loop); }

/**
 * 🧩 QUIZ SYSTEM (UPDATED WITH VISUAL CSS BLOCKS)
 */
function triggerQuiz() {
    GameState.paused = true; Map.puzzlePiece.active = false; 
    let qData = questions[GameState.sector % questions.length];
    
    // Inject the CSS Visual Block !
    document.getElementById('quiz-visual').innerHTML = qData.blockHTML || '';
    document.getElementById('quiz-question').innerText = qData.q;
    
    let optContainer = document.getElementById('quiz-options'); optContainer.innerHTML = '';
    let blockClass = "block-control";
    if (qData.type === 'operator') blockClass = "block-operator";
    if (qData.type === 'sensing') blockClass = "block-sensing";

    qData.options.forEach((opt, index) => {
        let btn = document.createElement('div'); btn.className = `scratch-block ${blockClass} text-base md:text-xl`;
        btn.innerText = opt; btn.onclick = () => answerQuiz(index, qData.ans); optContainer.appendChild(btn);
    });
    document.getElementById('quiz-modal').classList.remove('hide');
}

function answerQuiz(selectedIndex, correctIndex) {
    if (selectedIndex === correctIndex) {
        document.getElementById('quiz-modal').classList.add('hide');
        Audio.playCorrect(); Map.spawnParticles(Map.puzzlePiece.x, Map.puzzlePiece.y);
        GameState.score += 50; GameState.speedBoostTimer = 120; GameState.sector++;
        GameState.checkpointX = player.x; GameState.updateHUD(); Map.generate(); GameState.paused = false;
    } else {
        GameState.hp--; Audio.playWrong(); GameState.updateHUD();
        if(GameState.hp > 0) {
            showWarning("ผิดพลาด! ลองใหม่อีกครั้ง"); document.getElementById('quiz-modal').classList.add('hide');
            player.x -= 150; player.y -= 20; player.vx = 0; player.vy = 0; Map.puzzlePiece.active = true; GameState.paused = false;
        } else {
            showWarning("หมดกำลังใจ เริ่มใหม่นะ!"); document.getElementById('quiz-modal').classList.add('hide');
            GameState.hp = 5; GameState.score = 0; GameState.sector = 0; GameState.checkpointX = 100;
            GameState.updateHUD(); Map.generate(); player.x = GameState.checkpointX; player.y = 50;
            player.vx = 0; player.vy = 0; GameState.paused = false;
        }
    }
}
function showWarning(msg) { let w = document.getElementById('warning-msg'); w.innerText = msg; w.style.opacity = 1; setTimeout(() => { w.style.opacity = 0; }, 2000); }

window.addEventListener('keydown', e => { if (e.code === 'ArrowLeft') Inputs.left = true; if (e.code === 'ArrowRight') Inputs.right = true; if (e.code === 'Space' || e.code === 'ArrowUp') Inputs.jump = true; });
window.addEventListener('keyup', e => { if (e.code === 'ArrowLeft') Inputs.left = false; if (e.code === 'ArrowRight') Inputs.right = false; if (e.code === 'Space' || e.code === 'ArrowUp') Inputs.jump = false; });
function bindBtn(id, key) {
    let btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); Inputs[key] = true; }); btn.addEventListener('touchend', (e) => { e.preventDefault(); Inputs[key] = false; });
    btn.addEventListener('mousedown', () => { Inputs[key] = true; }); btn.addEventListener('mouseup', () => { Inputs[key] = false; }); btn.addEventListener('mouseleave', () => { Inputs[key] = false; });
}
bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right'); bindBtn('btn-jump', 'jump');

async function initAR() {
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
        document.getElementById('ar-status').innerText = "AR: ไลบรารีขัดข้อง (ใช้ปุ่มแทน)"; document.getElementById('ar-status').style.color = "#ff4444"; document.getElementById('ar-status').classList.remove('hide'); return;
    }
    try {
        document.getElementById('ar-status').classList.remove('hide');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        // ปรับ modelComplexity เป็น 0 เพื่อให้ประมวลผลเร็วและลื่นที่สุด
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults((results) => {
            if (GameState.paused) return; 
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('ar-status').innerText = "AR: ตรวจพบมือ"; document.getElementById('ar-status').style.color = "#00ff00";
                const lm = results.multiHandLandmarks[0];
                currentHand = lm; // อัปเดตข้อมูลมือเพื่อให้ฟังก์ชัน Draw เอาไปจำลองกราฟิก
                
                let wrist = lm[0], thumbTip = lm[4], indexTip = lm[8], middleTip = lm[12];
                let pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                let openDist = Math.hypot(middleTip.x - wrist.x, middleTip.y - wrist.y);
                
                if (pinchDist < 0.08) { Inputs.jump = true; } else { Inputs.jump = false; }
                
                // เพิ่ม Deadzone ช่องว่างตรงกลาง เพื่อไม่ให้ตัวละครเดินสลับไปมาเร็วเกินไป
                if (openDist > 0.35) { Inputs.right = true; Inputs.left = false; } 
                else if (openDist < 0.25 && pinchDist > 0.08) { Inputs.left = true; Inputs.right = false; } 
                else { Inputs.left = false; Inputs.right = false; }
            } else {
                document.getElementById('ar-status').innerText = "AR: ไม่พบมือ"; document.getElementById('ar-status').style.color = "#ffffff";
                currentHand = null; // ซ่อนมือจำลองเมื่อหาไม่เจอ
                if(!Inputs.jumpPressed) Inputs.jump = false; Inputs.left = false; Inputs.right = false;
            }
        });
        // ปรับลดความละเอียดรับภาพมาเป็นระดับมาตรฐานเพื่อให้ลื่นไหล
        const camera = new Camera(document.getElementById('ar-video'), { onFrame: async () => { await hands.send({image: document.getElementById('ar-video')}); }, width: 640, height: 480 });
        await camera.start(); document.getElementById('ar-video').classList.remove('hide');
    } catch (err) {
        document.getElementById('ar-status').innerText = "AR: กล้องถูกบล็อก"; document.getElementById('ar-status').style.color = "#ff4444";
    }
}

document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('start-screen').classList.add('hide'); document.getElementById('hud').classList.remove('hide');
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) document.getElementById('touch-controls').classList.remove('hide');
    try { if(typeof Tone !== 'undefined') await Tone.start(); Audio.init(); } catch(e) {}
    initAR(); resize(); GameState.init(); Map.generate(); GameState.running = true; requestAnimationFrame(loop);
});
</script>
